name: Docker Build and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image for testing
        run: docker build -t mysite-test .

      - name: PHP Syntax Check
        run: |
          docker run --rm --entrypoint "" mysite-test \
            find /var/www/mysite -name "*.php" \
            -exec php -l {} \;

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd server-setup/website || exit 1
            git fetch origin main
            git reset --hard origin/main

            docker compose build
            docker compose up -d

            # Ждём healthy статус вместо sleep 5
            echo "Waiting for containers to be healthy..."
            for i in {1..30}; do
              PHP_HEALTH=$(docker inspect \
                -f '{{.State.Health.Status}}' mysite_php 2>/dev/null)
              NGINX_HEALTH=$(docker inspect \
                -f '{{.State.Health.Status}}' mysite_nginx 2>/dev/null)

              if [ "$PHP_HEALTH" = "healthy" ] \
                && [ "$NGINX_HEALTH" = "healthy" ]; then
                echo "✓ All containers healthy"
                break
              fi

              echo "  PHP=$PHP_HEALTH Nginx=$NGINX_HEALTH (attempt $i/30)"
              sleep 2

              if [ $i -eq 30 ]; then
                echo "✗ Timeout: containers not healthy"
                docker compose logs
                exit 1
              fi
            done

            docker image prune -f
            echo "✓ Deploy complete"