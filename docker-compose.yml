version: '3.8'

services:
  php:
    build: .
    container_name: mysite_php
    restart: unless-stopped
    env_file: .env
    healthcheck:
      test: ["CMD", "pgrep", "-f", "php-fpm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 256M
        reservations:
          cpus: '0.5'
          memory: 128M
    volumes:
      - ./public:/var/www/mysite
      - ./vendor:/var/www/mysite/vendor:ro
      - ./private:/var/www/private:rw
      - ./logs:/var/www/mysite/logs:rw

  nginx:
    image: nginx:1.25-alpine
    container_name: mysite_nginx
    restart: always
    ports:
      - "127.0.0.1:8080:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "--max-redirect=0", "http://127.0.0.1/login.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.25'
          memory: 64M
    volumes:
      - ./public:/var/www/mysite:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      php:
        condition: service_healthy